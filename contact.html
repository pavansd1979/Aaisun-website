<body class="bg-slate-50 text-gray-800">

<img src="Aaisun.jpg" width="59" height ="64">
      <h1 class="text-4xl font-bold">Aaisun</h1>
      <nav class="flex gap-6">
        <a href="index.html" class="hover:text-yellow-300">Home</a>
        <a href="about.html" class="hover:text-yellow-300">About</a>
        <a href="solutions.html" class="hover:text-yellow-300">Solutions</a>
        <a href="contact.html" class="hover:text-yellow-300">Contact</a>
      </nav>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 my-8">
    <section class="mb-6 p-4 bg-white rounded-lg shadow-md">
      <h2 class="text-2xl font-semibold mb-4">Contact Information</h2>
      <div class="space-y-4">
        <div>
<img src="Action1.webp" width="359" height ="264">
          <h3 class="font-semibold">Email</h3>
          <p><a href="mailto:dsp0405pavan@aaisun.com@aaisun.com" class="text-blue-600 hover:underline">dsp0405pavan@aaisun.com@aaisun.com</a></p>
        </div>
        <div>
          <h3 class="font-semibold">Phone</h3>
          <p>+91 8793004444</p>
        </div>
        <div>
          <h3 class="font-semibold">Address</h3>
          <p>1402 Tower 11 <br>Blueridge Township Hinjawadi Phase 1 <br>Maharashtra</p>
        </div>
      </div>
    </section>

    <section class="mb-6 p-4 bg-white rounded-lg shadow-md">
      <h2 class="text-2xl font-semibold mb-4">Contact Form</h2>
      <form class="space-y-4">
        <div>
          <label class="block font-semibold mb-2">Name</label>
          <input type="text" class="w-full border rounded px-3 py-2" placeholder="Your name" required>
        </div>
        <div>
          <label class="block font-semibold mb-2">Email</label>
          <input type="email" class="w-full border rounded px-3 py-2" placeholder="your@email.com" required>
        </div>
        <div>
          <label class="block font-semibold mb-2">Message</label>
          <textarea class="w-full border rounded px-3 py-2 h-32" placeholder="Your message..." required></textarea>
        </div>
        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">Send Message</button>
      </form>
    </section>
  </main>

  <footer class="text-center py-4 text-gray-500">
